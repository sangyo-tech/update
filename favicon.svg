<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#0b1f3a"/>
  <!-- 歯車 -->
  <g fill="#e8b84b">
    <!-- 中心の円（リング） -->
    <path d="M16 10a6 6 0 100 12A6 6 0 0016 10zm0 2a4 4 0 110 8 4 4 0 010-8z"/>
    <!-- 歯（上下左右と斜め8方向） -->
    <rect x="14.5" y="3" width="3" height="4" rx="1"/>
    <rect x="14.5" y="25" width="3" height="4" rx="1"/>
    <rect x="3" y="14.5" width="4" height="3" rx="1"/>
    <rect x="25" y="14.5" width="4" height="3" rx="1"/>
    <!-- 斜め歯 -->
    <rect x="6.5" y="5.5" width="3" height="4" rx="1" transform="rotate(45 8 7.5)"/>
    <rect x="22.5" y="5.5" width="3" height="4" rx="1" transform="rotate(-45 24 7.5)"/>
    <rect x="6.5" y="22.5" width="3" height="4" rx="1" transform="rotate(-45 8 24.5)"/>
    <rect x="22.5" y="22.5" width="3" height="4" rx="1" transform="rotate(45 24 24.5)"/>
  </g>
</svg>
